services:

  db:
    image: postgres:16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: newsdb

    ports:
      - "5433:5432"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d newsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  etl:
    build: ./etl

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy