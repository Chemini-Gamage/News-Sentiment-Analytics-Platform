services:

  db:

    image: postgres:16

    environment:

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: admin

      POSTGRES_DB: newsdb

    ports:

      - "5432:5432"

    volumes:

      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  etl:

    build: ./etl

    env_file:
      - .env

    depends_on:
      - db
